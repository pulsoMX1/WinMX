<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinMX Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;900&display=swap');
        :root { --mx-green: #10b981; --mx-dark: #070707; }
        * { box-sizing: border-box; }
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }
        .font-casino { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
        .glass { background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%); border: 1px solid rgba(255,255,255,0.08); border-radius: 1.2rem; backdrop-filter: blur(20px); }
        .btn { padding: 10px 18px; border-radius: 0.8rem; font-weight: 900; font-size: 11px; text-transform: uppercase; cursor: pointer; border: none; transition: all 0.2s; letter-spacing: 0.5px; }
        .btn-green { background: linear-gradient(135deg, #10b981, #059669); color: black; }
        .btn-green:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-red { background: linear-gradient(135deg, #ef4444, #b91c1c); color: white; }
        .btn-red:hover { opacity: 0.85; }
        .btn-yellow { background: linear-gradient(135deg, #f59e0b, #d97706); color: black; }
        .btn-yellow:hover { opacity: 0.85; }
        .btn-blue { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; }
        .btn-blue:hover { opacity: 0.85; }
        .btn-gray { background: rgba(255,255,255,0.08); color: #aaa; border: 1px solid rgba(255,255,255,0.12); }
        .btn-gray:hover { background: rgba(255,255,255,0.12); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
        input, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 0.6rem; color: white; padding: 9px 12px; font-size: 12px; font-family: 'Inter', sans-serif; outline: none; width: 100%; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: var(--mx-green); box-shadow: 0 0 0 3px rgba(16,185,129,0.12); }
        select option { background: #1a1a1a; color: white; }
        label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #888; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
        .match-row { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 1rem; padding: 18px; margin-bottom: 12px; transition: border-color 0.2s; }
        .match-row:hover { border-color: rgba(255,255,255,0.15); }
        .match-row.live { border-color: rgba(239,68,68,0.4); background: rgba(239,68,68,0.04); }
        .match-row.finished { border-color: rgba(255,255,255,0.04); opacity: 0.5; }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 99px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-live { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #f87171; }
        .badge-upcoming { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; }
        .badge-finished { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #666; }
        .badge-paused { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.4); color: #fbbf24; }
        .live-dot { width: 7px; height: 7px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; display: inline-block; }
        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(16,185,129,0.3); border-top-color: #10b981; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
        .toast { position: fixed; top: 24px; right: 24px; z-index: 9999; padding: 14px 20px; border-radius: 0.9rem; font-size: 12px; font-weight: 700; box-shadow: 0 8px 32px rgba(0,0,0,0.5); animation: fadeIn 0.3s ease; max-width: 340px; }
        .toast-success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.4); color: #10b981; }
        .toast-error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4); color: #ef4444; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(-8px);} to{opacity:1;transform:translateY(0);} }
        .section-title { font-family: 'Archivo Black', sans-serif; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #10b981; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .score-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 0.8rem; padding: 12px; }
        .live-controls { background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.2); border-radius: 0.8rem; padding: 12px; margin-top: 10px; }
        .odds-row { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 0.7rem; padding: 10px 12px; }
        .tab-bar { display: flex; background: rgba(255,255,255,0.03); border-radius: 0.8rem; padding: 4px; margin-bottom: 20px; }
        .tab { flex: 1; text-align: center; padding: 8px; border-radius: 0.6rem; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #555; transition: all 0.2s; letter-spacing: 0.5px; }
        .tab.active { background: var(--mx-green); color: black; }
        .stat-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 0.9rem; padding: 16px; text-align: center; }
        .stat-val { font-family: 'Archivo Black', sans-serif; font-size: 28px; color: var(--mx-green); }
        .stat-lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #555; margin-top: 2px; }
    </style>
</head>
<body>

<!-- TOAST -->
<div id="toast-container"></div>

<div style="max-width:900px;margin:0 auto;padding:24px 16px;">

    <!-- HEADER -->
    <div class="glass" style="padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
        <div>
            <h1 class="font-casino" style="font-size:20px;margin:0;color:var(--mx-green);">⚙️ WinMX Admin</h1>
            <p style="font-size:10px;color:#555;margin:4px 0 0;font-weight:600;text-transform:uppercase;">Panel de Control · Mundial 2026</p>
        </div>
        <div style="display:flex;align-items:center;gap:10px;">
            <div id="conn-indicator" style="display:flex;align-items:center;gap:6px;font-size:10px;color:#555;font-weight:700;">
                <div class="spinner"></div> Conectando…
            </div>
            <button class="btn btn-gray" onclick="loadAll()"><i class="fas fa-sync-alt"></i> Actualizar</button>
        </div>
    </div>

    <!-- STATS ROW -->
    <div class="grid-3" style="margin-bottom:24px;">
        <div class="stat-card">
            <div class="stat-val" id="stat-total">—</div>
            <div class="stat-lbl">Partidos totales</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="stat-live" style="color:#ef4444;">—</div>
            <div class="stat-lbl">En vivo ahora</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="stat-bets">—</div>
            <div class="stat-lbl">Apuestas pendientes</div>
        </div>
    </div>

    <!-- TABS -->
    <div class="tab-bar">
        <div class="tab active" id="tab-matches" onclick="switchTab('matches')">⚽ Partidos</div>
        <div class="tab" id="tab-create" onclick="switchTab('create')">➕ Nuevo Partido</div>
        <div class="tab" id="tab-bets" onclick="switchTab('bets')">🎫 Apuestas</div>
    </div>

    <!-- ====== TAB: PARTIDOS ====== -->
    <div id="view-matches">
        <div id="matches-list"><div style="text-align:center;padding:48px;"><div class="spinner" style="margin:0 auto;"></div></div></div>
    </div>

    <!-- ====== TAB: CREAR PARTIDO ====== -->
    <div id="view-create" style="display:none;">
        <div class="glass" style="padding:24px;">
            <div class="section-title"><i class="fas fa-plus-circle"></i> Crear Nuevo Partido</div>
            <div class="grid-2" style="margin-bottom:12px;">
                <div><label>Equipo Local</label><input id="c-home" placeholder="Ej: México" /></div>
                <div><label>Equipo Visitante</label><input id="c-away" placeholder="Ej: Argentina" /></div>
            </div>
            <div class="grid-3" style="margin-bottom:12px;">
                <div><label>Fecha</label><input id="c-date" type="text" placeholder="26 Jun" /></div>
                <div><label>Hora</label><input id="c-time" type="text" placeholder="18:00" /></div>
                <div><label>Estadio</label><input id="c-venue" placeholder="Estadio Azteca" /></div>
            </div>
            <div class="grid-2" style="margin-bottom:12px;">
                <div><label>Grupo / Fase</label><input id="c-group" placeholder="A" /></div>
                <div>
                    <label>Fase</label>
                    <select id="c-phase">
                        <option value="Grupos">Grupos</option>
                        <option value="Octavos">Octavos</option>
                        <option value="Cuartos">Cuartos</option>
                        <option value="Semifinal">Semifinal</option>
                        <option value="Final">Final</option>
                    </select>
                </div>
            </div>
            <div class="odds-row" style="margin-bottom:16px;">
                <div class="section-title" style="margin-bottom:10px;font-size:10px;"><i class="fas fa-chart-line"></i> Cuotas iniciales</div>
                <div class="grid-3">
                    <div><label>1 Local</label><input id="c-odd1" type="number" step="0.01" value="2.00" /></div>
                    <div><label>X Empate</label><input id="c-oddx" type="number" step="0.01" value="3.20" /></div>
                    <div><label>2 Visitante</label><input id="c-odd2" type="number" step="0.01" value="3.50" /></div>
                </div>
            </div>
            <button class="btn btn-green" style="width:100%;padding:14px;" onclick="createMatch()"><i class="fas fa-save"></i> &nbsp;Crear Partido</button>
        </div>
    </div>

    <!-- ====== TAB: APUESTAS ====== -->
    <div id="view-bets" style="display:none;">
        <div id="bets-list"><div style="text-align:center;padding:48px;"><div class="spinner" style="margin:0 auto;"></div></div></div>
    </div>

</div>

<!-- MODAL EDITAR PARTIDO -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:800;backdrop-filter:blur(4px);" onclick="closeModal()"></div>
<div id="modal-edit" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:900;width:min(560px,95vw);max-height:90vh;overflow-y:auto;">
    <div class="glass" style="padding:24px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2 class="font-casino" style="font-size:15px;margin:0;color:var(--mx-green);" id="modal-title">Editar Partido</h2>
            <button onclick="closeModal()" style="background:rgba(255,255,255,0.06);border:none;color:#888;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;">✕</button>
        </div>
        <div id="modal-body"></div>
    </div>
</div>

<script>
// ────────────────────────────────────────────────────────────
// SUPABASE CONFIG — PEGA TUS CREDENCIALES AQUÍ
// ────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://ftuqlmsstnzjhbodgeii.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dXFsbXNzdG56amhib2RnZWlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg0NzU2MDgsImV4cCI6MjA2NDA1MTYwOH0.K5TBJqXhqMHD3L-LTXL7fqEY7dNfSHYT9PtL3vFv8J4';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let allMatches = [];
let allBets = [];
let currentTab = 'matches';
let editingId = null;

// ── Toast ──────────────────────────────────────────
function toast(msg, type = 'success') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.innerHTML = msg;
    c.appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

// ── Tab switching ──────────────────────────────────
function switchTab(tab) {
    currentTab = tab;
    ['matches','create','bets'].forEach(t => {
        document.getElementById(`view-${t}`).style.display = t === tab ? 'block' : 'none';
        document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
    });
    if (tab === 'bets') loadBets();
}

// ── Load all ──────────────────────────────────────
async function loadAll() {
    await loadMatches();
    await loadStats();
}

async function loadMatches() {
    const { data, error } = await sb.from('wc_matches').select('*').order('match_date', { ascending: true });
    if (error) return toast('Error cargando partidos: ' + error.message, 'error');
    allMatches = data || [];
    renderMatchesList();
}

async function loadStats() {
    const total = allMatches.length;
    const live  = allMatches.filter(m => m.status === 'live').length;
    document.getElementById('stat-total').innerText = total;
    document.getElementById('stat-live').innerText  = live;
    const { count } = await sb.from('wc_bets').select('*', { count: 'exact', head: true }).eq('status', 'pending');
    document.getElementById('stat-bets').innerText = count ?? '—';
}

async function loadBets() {
    const list = document.getElementById('bets-list');
    list.innerHTML = '<div style="text-align:center;padding:40px;"><div class="spinner" style="margin:0 auto;"></div></div>';
    const { data, error } = await sb.from('wc_bets').select('*, usuarios(email)').order('created_at', { ascending: false }).limit(100);
    if (error) { list.innerHTML = `<p style="color:#ef4444;text-align:center;font-size:11px;padding:24px;">Error: ${error.message}</p>`; return; }
    allBets = data || [];
    renderBetsList();
}

// ── Render matches ──────────────────────────────────
function renderMatchesList() {
    const list = document.getElementById('matches-list');
    if (allMatches.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:60px;color:#555;font-size:11px;font-weight:700;text-transform:uppercase;">No hay partidos aún. Crea el primero ↑</div>';
        return;
    }
    // Sort: live first, then upcoming, then finished
    const sorted = [...allMatches].sort((a, b) => {
        const ord = { live: 0, upcoming: 1, finished: 2 };
        return (ord[a.status] ?? 1) - (ord[b.status] ?? 1);
    });
    list.innerHTML = sorted.map(m => matchRow(m)).join('');
}

function matchRow(m) {
    const isLive = m.status === 'live';
    const isFinished = m.status === 'finished';
    const isPaused = isLive && m.bets_paused;

    const statusBadge = isLive
        ? `<span class="badge badge-live"><span class="live-dot"></span>EN VIVO</span>${isPaused ? ' <span class="badge badge-paused">⏸ PAUSADO</span>' : ''}`
        : isFinished
        ? `<span class="badge badge-finished">FINALIZADO</span>`
        : `<span class="badge badge-upcoming">PRÓXIMO</span>`;

    const scoreHtml = isLive || isFinished
        ? `<span style="font-family:'Archivo Black',sans-serif;font-size:22px;color:white;letter-spacing:6px;">${m.score_home ?? 0} — ${m.score_away ?? 0}</span>`
        : `<span style="font-size:13px;color:#333;font-weight:900;">VS</span>`;

    return `
    <div class="match-row ${isLive ? 'live' : ''} ${isFinished ? 'finished' : ''}" id="mr-${m.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                ${statusBadge}
                <span style="font-size:9px;color:#555;font-weight:700;">${m.match_date || ''} · ${m.match_time || ''} ${m.venue ? '· '+m.venue : ''}</span>
                ${isLive && m.minute ? `<span style="font-size:9px;color:#ef4444;font-weight:900;">${m.minute}'</span>` : ''}
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
                ${!isFinished ? `<button class="btn btn-gray" style="padding:7px 14px;" onclick="openEdit('${m.id}')"><i class="fas fa-pen"></i> Editar</button>` : ''}
                ${!isLive && !isFinished ? `<button class="btn btn-green" style="padding:7px 14px;" onclick="goLive('${m.id}')"><i class="fas fa-broadcast-tower"></i> Iniciar EN VIVO</button>` : ''}
                ${isLive ? `
                    ${isPaused
                        ? `<button class="btn btn-green" style="padding:7px 14px;" onclick="toggleBetsPause('${m.id}', false)"><i class="fas fa-play"></i> Reanudar Apuestas</button>`
                        : `<button class="btn btn-yellow" style="padding:7px 14px;" onclick="toggleBetsPause('${m.id}', true)"><i class="fas fa-pause"></i> Pausar Apuestas</button>`
                    }
                    <button class="btn btn-red" style="padding:7px 14px;" onclick="finishMatch('${m.id}')"><i class="fas fa-flag-checkered"></i> Finalizar</button>
                ` : ''}
                ${isFinished ? `<button class="btn btn-blue" style="padding:7px 14px;" onclick="settleMatch('${m.id}')"><i class="fas fa-gavel"></i> Resolver Apuestas</button>` : ''}
                <button class="btn btn-red" style="padding:7px 14px;background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.3);" onclick="deleteMatch('${m.id}')"><i class="fas fa-trash"></i></button>
            </div>
        </div>

        <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;">
            <div style="flex:1;text-align:right;"><span style="font-size:16px;font-weight:900;color:white;">${m.home}</span></div>
            <div style="padding:6px 16px;background:rgba(255,255,255,0.04);border-radius:8px;border:1px solid rgba(255,255,255,0.07);text-align:center;">${scoreHtml}</div>
            <div style="flex:1;text-align:left;"><span style="font-size:16px;font-weight:900;color:white;">${m.away}</span></div>
        </div>

        <div class="odds-row" style="display:flex;gap:12px;">
            <div style="flex:1;text-align:center;">
                <div style="font-size:8px;color:#555;font-weight:700;text-transform:uppercase;margin-bottom:2px;">1 Local</div>
                <div style="font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--mx-green);">${(m.home_odd||2).toFixed(2)}</div>
            </div>
            <div style="flex:1;text-align:center;">
                <div style="font-size:8px;color:#555;font-weight:700;text-transform:uppercase;margin-bottom:2px;">X Empate</div>
                <div style="font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--mx-green);">${(m.draw_odd||3.2).toFixed(2)}</div>
            </div>
            <div style="flex:1;text-align:center;">
                <div style="font-size:8px;color:#555;font-weight:700;text-transform:uppercase;margin-bottom:2px;">2 Visitante</div>
                <div style="font-family:'Archivo Black',sans-serif;font-size:16px;color:var(--mx-green);">${(m.away_odd||3.5).toFixed(2)}</div>
            </div>
        </div>
    </div>`;
}

// ── Open edit modal ─────────────────────────────────────────
function openEdit(id) {
    const m = allMatches.find(x => x.id === id);
    if (!m) return;
    editingId = id;
    const isLive = m.status === 'live';

    document.getElementById('modal-title').innerText = `${m.home} vs ${m.away}`;

    let body = '';

    if (isLive) {
        // ── EN VIVO: solo marcador, minuto, cuotas, pausa ──
        body = `
        <div class="score-box" style="margin-bottom:14px;">
            <div class="section-title" style="margin-bottom:10px;font-size:10px;"><span class="live-dot"></span> Marcador EN VIVO</div>
            <div class="grid-2" style="margin-bottom:8px;">
                <div>
                    <label>${m.home}</label>
                    <input id="e-score-home" type="number" min="0" value="${m.score_home ?? 0}" />
                </div>
                <div>
                    <label>${m.away}</label>
                    <input id="e-score-away" type="number" min="0" value="${m.score_away ?? 0}" />
                </div>
            </div>
            <div>
                <label>Minuto del partido</label>
                <input id="e-minute" type="number" min="0" max="120" value="${m.minute || ''}" placeholder="45" />
            </div>
        </div>
        <div class="live-controls" style="margin-bottom:14px;">
            <div class="section-title" style="margin-bottom:10px;font-size:10px;"><i class="fas fa-chart-line"></i> Cuotas en vivo</div>
            <div class="grid-3">
                <div><label>1 Local</label><input id="e-odd1" type="number" step="0.01" value="${(m.home_odd||2).toFixed(2)}" /></div>
                <div><label>X Empate</label><input id="e-oddx" type="number" step="0.01" value="${(m.draw_odd||3.2).toFixed(2)}" /></div>
                <div><label>2 Visitante</label><input id="e-odd2" type="number" step="0.01" value="${(m.away_odd||3.5).toFixed(2)}" /></div>
            </div>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:14px;">
            <button class="btn ${m.bets_paused ? 'btn-green' : 'btn-yellow'}" style="flex:1;" onclick="toggleBetsPause('${id}', ${!m.bets_paused}); closeModal();">
                <i class="fas fa-${m.bets_paused ? 'play' : 'pause'}"></i> ${m.bets_paused ? 'Reanudar Apuestas' : 'Pausar Apuestas'}
            </button>
        </div>
        <button class="btn btn-green" style="width:100%;padding:14px;" onclick="saveLiveEdit('${id}')">
            <i class="fas fa-save"></i> &nbsp;Guardar Cambios
        </button>`;
    } else {
        // ── PRÓXIMO: editar todo ──
        body = `
        <div class="grid-2" style="margin-bottom:12px;">
            <div><label>Equipo Local</label><input id="e-home" value="${m.home || ''}" /></div>
            <div><label>Equipo Visitante</label><input id="e-away" value="${m.away || ''}" /></div>
        </div>
        <div class="grid-3" style="margin-bottom:12px;">
            <div><label>Fecha</label><input id="e-date" value="${m.match_date || ''}" /></div>
            <div><label>Hora</label><input id="e-time" value="${m.match_time || ''}" /></div>
            <div><label>Estadio</label><input id="e-venue" value="${m.venue || ''}" /></div>
        </div>
        <div class="grid-2" style="margin-bottom:12px;">
            <div><label>Grupo</label><input id="e-group" value="${m.group_name || ''}" /></div>
            <div><label>Fase</label>
                <select id="e-phase">
                    ${['Grupos','Octavos','Cuartos','Semifinal','Final'].map(p => `<option value="${p}" ${m.phase===p?'selected':''}>${p}</option>`).join('')}
                </select>
            </div>
        </div>
        <div class="odds-row" style="margin-bottom:16px;">
            <div class="section-title" style="margin-bottom:10px;font-size:10px;"><i class="fas fa-chart-line"></i> Cuotas</div>
            <div class="grid-3">
                <div><label>1 Local</label><input id="e-odd1" type="number" step="0.01" value="${(m.home_odd||2).toFixed(2)}" /></div>
                <div><label>X Empate</label><input id="e-oddx" type="number" step="0.01" value="${(m.draw_odd||3.2).toFixed(2)}" /></div>
                <div><label>2 Visitante</label><input id="e-odd2" type="number" step="0.01" value="${(m.away_odd||3.5).toFixed(2)}" /></div>
            </div>
        </div>
        <button class="btn btn-green" style="width:100%;padding:14px;" onclick="saveUpcomingEdit('${id}')">
            <i class="fas fa-save"></i> &nbsp;Guardar Cambios
        </button>`;
    }

    document.getElementById('modal-body').innerHTML = body;
    document.getElementById('modal-overlay').style.display = 'block';
    document.getElementById('modal-edit').style.display = 'block';
}

function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('modal-edit').style.display = 'none';
    editingId = null;
}

// ── Save live edit (sin notificación) ──────────────────────
async function saveLiveEdit(id) {
    const updates = {
        score_home: parseInt(document.getElementById('e-score-home').value) || 0,
        score_away: parseInt(document.getElementById('e-score-away').value) || 0,
        minute: document.getElementById('e-minute').value || null,
        home_odd: parseFloat(document.getElementById('e-odd1').value) || 2,
        draw_odd: parseFloat(document.getElementById('e-oddx').value) || 3.2,
        away_odd: parseFloat(document.getElementById('e-odd2').value) || 3.5,
    };
    const { error } = await sb.from('wc_matches').update(updates).eq('id', id);
    if (error) return toast('Error: ' + error.message, 'error');
    toast('✅ Partido actualizado (sin notificación a usuarios)', 'success');
    closeModal();
    await loadAll();
}

// ── Save upcoming edit ──────────────────────────────────────
async function saveUpcomingEdit(id) {
    const updates = {
        home: document.getElementById('e-home').value.trim(),
        away: document.getElementById('e-away').value.trim(),
        match_date: document.getElementById('e-date').value.trim(),
        match_time: document.getElementById('e-time').value.trim(),
        venue: document.getElementById('e-venue').value.trim(),
        group_name: document.getElementById('e-group').value.trim(),
        phase: document.getElementById('e-phase').value,
        home_odd: parseFloat(document.getElementById('e-odd1').value) || 2,
        draw_odd: parseFloat(document.getElementById('e-oddx').value) || 3.2,
        away_odd: parseFloat(document.getElementById('e-odd2').value) || 3.5,
    };
    if (!updates.home || !updates.away) return toast('Completa los equipos', 'error');
    const { error } = await sb.from('wc_matches').update(updates).eq('id', id);
    if (error) return toast('Error: ' + error.message, 'error');
    toast('✅ Partido actualizado', 'success');
    closeModal();
    await loadAll();
}

// ── Iniciar en vivo → ESTO SÍ manda notificación a usuarios ─
async function goLive(id) {
    if (!confirm('¿Iniciar este partido EN VIVO? Esto notificará a todos los usuarios.')) return;
    const { error } = await sb.from('wc_matches').update({
        status: 'live',
        score_home: 0,
        score_away: 0,
        minute: '0',
        bets_paused: false,
    }).eq('id', id);
    if (error) return toast('Error: ' + error.message, 'error');
    toast('🟢 ¡Partido iniciado EN VIVO! Notificación enviada a usuarios.', 'success');
    await loadAll();
}

// ── Pausar / Reanudar apuestas ──────────────────────────────
async function toggleBetsPause(id, pause) {
    const { error } = await sb.from('wc_matches').update({ bets_paused: pause }).eq('id', id);
    if (error) return toast('Error: ' + error.message, 'error');
    toast(pause ? '⏸ Apuestas PAUSADAS — usuarios no pueden apostar' : '▶️ Apuestas REANUDADAS', pause ? 'error' : 'success');
    await loadAll();
}

// ── Finalizar partido ───────────────────────────────────────
async function finishMatch(id) {
    const m = allMatches.find(x => x.id === id);
    if (!m) return;
    const scoreH = m.score_home ?? 0;
    const scoreA = m.score_away ?? 0;
    if (!confirm(`¿Finalizar ${m.home} ${scoreH}-${scoreA} ${m.away}? Esto cerrará el partido para nuevas apuestas.`)) return;
    const { error } = await sb.from('wc_matches').update({ status: 'finished', bets_paused: true }).eq('id', id);
    if (error) return toast('Error: ' + error.message, 'error');
    toast('🏁 Partido finalizado. Ahora puedes resolver las apuestas.', 'success');
    await loadAll();
}

// ── Resolver apuestas del partido ──────────────────────────
async function settleMatch(id) {
    const m = allMatches.find(x => x.id === id);
    if (!m) return;
    const scoreH = parseInt(m.score_home) || 0;
    const scoreA = parseInt(m.score_away) || 0;
    let winner = scoreH > scoreA ? '1' : scoreA > scoreH ? '2' : 'X';
    if (!confirm(`Resolver apuestas de ${m.home} ${scoreH}-${scoreA} ${m.away}.\nGanador: "${winner === '1' ? m.home : winner === '2' ? m.away : 'Empate'}"\n\nSe pagarán las apuestas ganadoras. ¿Continuar?`)) return;

    const { data: bets } = await sb.from('wc_bets').select('*').eq('status', 'pending');
    if (!bets || bets.length === 0) { toast('No hay apuestas pendientes para este partido', 'error'); return; }

    let paid = 0, lost = 0, errors = 0;
    for (const bet of bets) {
        const picks = bet.picks || [];
        const thisPick = picks.find(p => p.matchId === id);
        if (!thisPick) continue; // apuesta no incluye este partido

        // Si la apuesta tiene varios partidos, revisamos si TODOS ganaron
        const allResolved = picks.every(p => {
            if (p.matchId === id) return thisPick.pick === winner;
            const pm = allMatches.find(x => x.id === p.matchId);
            if (!pm || pm.status !== 'finished') return false; // partido aún no resuelto
            const ph = parseInt(pm.score_home) || 0;
            const pa = parseInt(pm.score_away) || 0;
            const pw = ph > pa ? '1' : pa > ph ? '2' : 'X';
            return p.pick === pw;
        });

        // Si aún hay partidos pendientes en la apuesta, no resolverla ahora
        const hasPending = picks.some(p => {
            if (p.matchId === id) return false;
            const pm = allMatches.find(x => x.id === p.matchId);
            return !pm || pm.status !== 'finished';
        });
        if (hasPending) continue;

        const newStatus = allResolved ? 'won' : 'lost';
        const { error: betErr } = await sb.from('wc_bets').update({ status: newStatus }).eq('id', bet.id);
        if (betErr) { errors++; continue; }

        if (newStatus === 'won') {
            const { error: balErr } = await sb.from('usuarios')
                .update({ saldo: sb.rpc ? undefined : undefined })
                .eq('id', bet.user_id);
            // Usar RPC o raw update con increment
            const { data: usr } = await sb.from('usuarios').select('saldo').eq('id', bet.user_id).single();
            if (usr) {
                await sb.from('usuarios').update({ saldo: usr.saldo + bet.potential_win }).eq('id', bet.user_id);
            }
            paid++;
        } else { lost++; }
    }

    toast(`✅ Resuelto: ${paid} ganadas, ${lost} perdidas${errors ? ', '+errors+' errores' : ''}`, paid > 0 ? 'success' : 'error');
    await loadAll();
    if (currentTab === 'bets') await loadBets();
}

// ── Eliminar partido ────────────────────────────────────────
async function deleteMatch(id) {
    if (!confirm('¿Eliminar este partido? Esta acción no se puede deshacer.')) return;
    const { error } = await sb.from('wc_matches').delete().eq('id', id);
    if (error) return toast('Error: ' + error.message, 'error');
    toast('Partido eliminado', 'success');
    await loadAll();
}

// ── Crear partido ───────────────────────────────────────────
async function createMatch() {
    const home  = document.getElementById('c-home').value.trim();
    const away  = document.getElementById('c-away').value.trim();
    if (!home || !away) return toast('Completa los equipos', 'error');
    const newMatch = {
        home,
        away,
        match_date:  document.getElementById('c-date').value.trim(),
        match_time:  document.getElementById('c-time').value.trim(),
        venue:       document.getElementById('c-venue').value.trim(),
        group_name:  document.getElementById('c-group').value.trim(),
        phase:       document.getElementById('c-phase').value,
        home_odd:    parseFloat(document.getElementById('c-odd1').value) || 2,
        draw_odd:    parseFloat(document.getElementById('c-oddx').value) || 3.2,
        away_odd:    parseFloat(document.getElementById('c-odd2').value) || 3.5,
        status:      'upcoming',
        score_home:  0,
        score_away:  0,
        bets_paused: false,
    };
    const { error } = await sb.from('wc_matches').insert([newMatch]);
    if (error) return toast('Error: ' + error.message, 'error');
    toast('✅ Partido creado', 'success');
    ['c-home','c-away','c-date','c-time','c-venue','c-group'].forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('c-odd1').value = '2.00';
    document.getElementById('c-oddx').value = '3.20';
    document.getElementById('c-odd2').value = '3.50';
    await loadAll();
    switchTab('matches');
}

// ── Render bets ─────────────────────────────────────────────
function renderBetsList() {
    const list = document.getElementById('bets-list');
    if (allBets.length === 0) {
        list.innerHTML = '<div style="text-align:center;padding:60px;color:#555;font-size:11px;font-weight:700;text-transform:uppercase;">No hay apuestas registradas</div>';
        return;
    }
    list.innerHTML = allBets.map(b => {
        const sc = b.status === 'won' ? '#10b981' : b.status === 'lost' ? '#ef4444' : '#fbbf24';
        const st = b.status === 'won' ? '✅ GANADO' : b.status === 'lost' ? '❌ PERDIDO' : '⏳ PENDIENTE';
        const email = b.usuarios?.email || b.user_id?.slice(0,8)+'…';
        const d = new Date(b.created_at);
        const picks = b.picks || [];
        return `
        <div class="match-row" style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
                <div>
                    <span style="font-size:10px;font-weight:900;color:white;">${email}</span>
                    <span style="font-size:9px;color:#555;display:block;margin-top:2px;">${d.toLocaleString('es-MX')}</span>
                </div>
                <div style="text-align:right;">
                    <span style="font-size:10px;font-weight:900;color:${sc};">${st}</span>
                    <span style="font-family:'Archivo Black',sans-serif;color:white;font-size:14px;display:block;">$${(b.amount||0).toFixed(2)} × ${(b.total_odd||1).toFixed(2)} = $${(b.potential_win||0).toFixed(2)}</span>
                </div>
            </div>
            ${picks.map(p => `<div style="font-size:9px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;"><span style="color:#888;">${p.matchHome} vs ${p.matchAway}</span><span style="color:white;font-weight:700;">${p.label} (${p.odd.toFixed(2)})</span></div>`).join('')}
        </div>`;
    }).join('');
}

// ── Realtime para que el admin vea cambios también ─────────
function subscribeAdmin() {
    sb.channel('admin_live').on('postgres_changes', { event: '*', schema: 'public', table: 'wc_matches' }, () => {
        loadAll();
    }).subscribe((status) => {
        const el = document.getElementById('conn-indicator');
        if (status === 'SUBSCRIBED') {
            el.innerHTML = '<span style="width:8px;height:8px;background:#10b981;border-radius:50%;display:inline-block;"></span> Conectado en tiempo real';
            el.style.color = '#10b981';
        }
    });
}

// ── INIT ────────────────────────────────────────────────────
(async () => {
    await loadAll();
    subscribeAdmin();
})();
</script>
